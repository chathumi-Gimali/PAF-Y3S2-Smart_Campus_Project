name: Smart Campus CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Build & Test Spring Boot
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        working-directory: ./Booking-Service
        run: ./mvnw clean package -DskipTests

      - name: Run Tests
        working-directory: ./Booking-Service
        run: ./mvnw test

  frontend:
    name: Build React Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./booking-frontend
        run: npm install

      - name: Build frontend
        working-directory: ./booking-frontend
        run: npm run build